<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>הגדרות יומן</title>
  <link rel="manifest" href="./manifest.json" />
  <style>
    body{margin:0;font-family:Arial,sans-serif;background:#0f172a;color:#f8fafc}
    .wrap{max-width:820px;margin:0 auto;padding:20px}
    .card{background:#111827;border-radius:22px;padding:18px;margin-top:16px;box-shadow:0 10px 30px rgba(0,0,0,.25)}
    .title{font-size:30px;font-weight:800}
    .sub{color:#cbd5e1;margin-top:8px;line-height:1.6}
    .row{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
    .btn{display:inline-block;background:linear-gradient(180deg,#60a5fa,#2563eb);color:#fff;padding:12px 16px;border-radius:16px;text-decoration:none;font-weight:700;border:none;cursor:pointer}
    .btn.secondary{background:#1e293b}
    input{width:100%;margin-top:10px;padding:12px;border-radius:12px;border:none;box-sizing:border-box}
    .msg{margin-top:12px;padding:12px;border-radius:12px;display:none;white-space:pre-wrap}
    .ok{background:#14532d}
    .err{background:#7f1d1d}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="title">הגדרות</div>
      <div class="sub">ניהול token, webhook וטיוטות מקומיות</div>
      <div class="row">
        <a class="btn secondary" href="./index.html">דף הבית</a>
        <a class="btn secondary" href="./editor.html">עורך</a>
        <a class="btn secondary" href="./history.html">היסטוריה</a>
      </div>
    </div>

    <div class="card">
      <label>GitHub Token</label>
      <input id="token" type="password" placeholder="הדבק token עם הרשאת repo" />

      <label style="display:block;margin-top:14px">Webhook URL</label>
      <input id="webhook" type="text" placeholder="אופציונלי — כתובת webhook עתידית" />

      <div class="row">
        <button class="btn" onclick="saveSettings()">שמור הגדרות</button>
        <button class="btn secondary" onclick="clearSettings()">נקה הגדרות</button>
      </div>

      <div id="status" class="sub" style="margin-top:16px"></div>
      <div id="ok" class="msg ok"></div>
      <div id="err" class="msg err"></div>
    </div>

    <div class="card">
      <div class="title" style="font-size:24px">טיוטות ממתינות</div>
      <div id="draftCount" class="sub">0</div>
      <div class="row">
        <button class="btn secondary" onclick="clearDrafts()">מחק טיוטות ממתינות</button>
      </div>
    </div>
  </div>

<script>
const TOKEN_KEY = "gh";
const WEBHOOK_KEY = "journal_webhook_url";
const QUEUE_KEY = "journal_pending_queue";

function el(id){ return document.getElementById(id); }
function hideMsgs(){ ["ok","err"].forEach(id => el(id).style.display="none"); }
function show(id, text){ hideMsgs(); el(id).textContent=text; el(id).style.display='block'; }

function getQueue(){
  try { return JSON.parse(localStorage.getItem(QUEUE_KEY) || "[]"); }
  catch { return []; }
}

function refresh(){
  el("token").value = localStorage.getItem(TOKEN_KEY) || "";
  el("webhook").value = localStorage.getItem(WEBHOOK_KEY) || "";
  el("draftCount").textContent = String(getQueue().length);
  el("status").textContent =
    "Token: " + (localStorage.getItem(TOKEN_KEY) ? "שמור" : "לא שמור") +
    " | Webhook: " + (localStorage.getItem(WEBHOOK_KEY) ? "שמור" : "לא שמור");
}

function saveSettings(){
  localStorage.setItem(TOKEN_KEY, el("token").value.trim());
  localStorage.setItem(WEBHOOK_KEY, el("webhook").value.trim());
  refresh();
  show("ok","ההגדרות נשמרו ✅");
}

function clearSettings(){
  localStorage.removeItem(TOKEN_KEY);
  localStorage.removeItem(WEBHOOK_KEY);
  refresh();
  show("ok","ההגדרות נוקו");
}

function clearDrafts(){
  localStorage.removeItem(QUEUE_KEY);
  refresh();
  show("ok","הטיוטות נמחקו");
}

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js');
}

refresh();
</script>
</body>
</html>
