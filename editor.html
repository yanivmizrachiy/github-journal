<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>עורך יומן</title>
<style>
body{margin:0;font-family:Arial;background:#0f172a;color:#fff}
.wrap{max-width:700px;margin:auto;padding:20px}
input,textarea{width:100%;margin-top:10px;padding:10px;border-radius:10px;border:none}
button{margin-top:15px;padding:12px;border-radius:10px;border:none;background:#2563eb;color:#fff;font-weight:bold}
</style>
</head>
<body>
<div class="wrap">
<h2>עורך יומן</h2>

<input id="date" type="date">
<input id="day" placeholder="שם היום">
<input id="hebrew" placeholder="תאריך עברי">
<textarea id="notes" placeholder="כתוב כאן..."></textarea>

<button onclick="save()">שמור לריפו</button>

</div>

<script>
document.getElementById("date").value = new Date().toISOString().slice(0,10);

async function save(){
  const token = localStorage.getItem("gh") || prompt("הדבק token");
  if(!token) return alert("אין token");
  localStorage.setItem("gh", token);

  const date = document.getElementById("date").value;

  const data = {
    day_name: document.getElementById("day").value,
    date_gregorian: date,
    date_hebrew: document.getElementById("hebrew").value,
    events: [],
    notes: document.getElementById("notes").value,
    updated_at: new Date().toISOString()
  };

  const res = await fetch("https://api.github.com/repos/yanivmizrachiy/github-journal/actions/workflows/save-entry.yml/dispatches", {
    method: "POST",
    headers: {
      "Authorization": "Bearer " + token,
      "Accept": "application/vnd.github+json"
    },
    body: JSON.stringify({
      ref: "main",
      inputs: {
        date: date,
        content: JSON.stringify(data, null, 2)
      }
    })
  });

  if(res.ok){
    alert("נשמר לריפו ✅");
  } else {
    alert("שגיאה");
  }
}
</script>

</body>
</html>
