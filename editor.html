<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<title>כתיבה</title>
<link rel="stylesheet" href="./assets/styles.css?v=1775558877">
</head>
<body>

<div class="wrap">

<div class="nav">
<a class="daily" href="./index.html">יומי</a>
<a class="weekly" href="./history.html">שבועי</a>
<a class="monthly" href="./month.html">חודשי</a>
</div>

<div class="card">
<input type="date" id="date">
<textarea id="text"></textarea>
<button onclick="save()">שמור</button>
</div>

</div>

<script>
async function save(){
  const date=document.getElementById("date").value;
  const text=document.getElementById("text").value;

  if(!date)return alert("בחר תאריך");

  const data={
    event_type:"save_entry",
    client_payload:{
      date:date,
      data:JSON.stringify({
        notes:text,
        events:[]
      })
    }
  };

  const res=await fetch("https://api.github.com/repos/yanivmizrachiy/github-journal/dispatches",{
    method:"POST",
    headers:{
      "Accept":"application/vnd.github+json"
    },
    body:JSON.stringify(data)
  });

  if(res.ok){
    alert("נשמר בענן");
  }else{
    alert("שגיאה בשליחה");
  }
}
</script>

</body>
</html>
