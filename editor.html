<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<title>כתיבה</title>
<link rel="stylesheet" href="./assets/styles.css">
</head>
<body>

<div class="wrap">

<div class="nav">
<a class="daily" href="./index.html">יומי</a>
<a class="weekly" href="./history.html">שבועי</a>
<a class="monthly" href="./month.html">חודשי</a>
</div>

<div class="card">
<input type="date" id="date">
<textarea id="text" style="width:100%;height:200px"></textarea>
<button onclick="save()">שמור</button>
</div>

</div>

<script>
async function save(){
  const date=document.getElementById("date").value;
  const text=document.getElementById("text").value;

  if(!date)return alert("בחר תאריך");

  const data={
    notes:text,
    events:[]
  };

  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=date+".json";
  a.click();
}
</script>

</body>
</html>
