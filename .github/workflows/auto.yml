name: AUTO SYSTEM

on:
  issues:
    types: [opened]

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get issue text
        id: issue
        run: |
          echo "TEXT=${{ github.event.issue.body }}" >> $GITHUB_ENV

      - name: Apply logic
        run: |
          echo "Processing: $TEXT"

          if echo "$TEXT" | grep -i "דף בית"; then
            echo "Updating homepage..."

            cat > index.html <<EOT
<!doctype html>
<html lang="he" dir="rtl">
<body>
<h1>דף בית עודכן אוטומטית</h1>
</body>
</html>
EOT

          fi

      - name: Update RULES
        run: |
          cat > RULES.md <<EOT
# RULES AUTO

בקשה:
$TEXT

בוצע:
- שינוי אוטומטי לפי הבקשה

סטטוס:
- המערכת פועלת אוטומטית
EOT

      - name: Commit & Push
        run: |
          git config user.name "auto-bot"
          git config user.email "auto@github.com"
          git add .
          git commit -m "AUTO APPLY" || echo "no changes"
          git push
