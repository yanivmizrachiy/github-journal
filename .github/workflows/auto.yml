name: AUTO SYSTEM

on:
  issues:
    types: [opened]

jobs:
  apply:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Get issue text
        id: issue
        run: |
          echo "TEXT=${{ github.event.issue.body }}" >> $GITHUB_ENV

      - name: Detect command
        run: |
          echo "Command: $TEXT"

          if echo "$TEXT" | grep -q "CMD:upgrade-home"; then
            echo "UPGRADING HOMEPAGE"

            cat > index.html <<EOT
<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<title>יומן</title>
<style>
body{background:#020617;color:white;font-family:Arial;text-align:center}
h1{font-size:48px}
</style>
</head>
<body>
<h1>דף בית משודרג ✔</h1>
<p>המערכת האוטומטית עובדת</p>
</body>
</html>
EOT
          fi

          if echo "$TEXT" | grep -q "CMD:fix-rules"; then
            echo "UPDATING RULES"

            cat > RULES.md <<EOT
# RULES — AUTO ENGINE

עודכן אוטומטית לפי פקודה:
$TEXT

סטטוס:
- מערכת פקודות פעילה
- עדכון אוטומטי עובד
EOT
          fi

      - name: Commit & Push
        run: |
          git config user.name "auto-bot"
          git config user.email "auto@github.com"
          git add .
          git commit -m "AUTO COMMAND" || echo "no changes"
          git push
