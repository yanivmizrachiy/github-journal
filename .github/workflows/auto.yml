name: AUTO SYSTEM

on:
  issues:
    types: [opened]

jobs:
  apply:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Read issue
        run: |
          echo "TEXT<<EOF" >> $GITHUB_ENV
          echo "${{ github.event.issue.body }}" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Detect command
        run: |
          CMD="unknown"
          if echo "$TEXT" | grep -q "CMD:upgrade-home"; then CMD="upgrade-home"; fi
          if echo "$TEXT" | grep -q "CMD:premium-ui"; then CMD="premium-ui"; fi
          if echo "$TEXT" | grep -q "CMD:sync-rules"; then CMD="sync-rules"; fi
          if echo "$TEXT" | grep -q "CMD:audit"; then CMD="audit"; fi
          if echo "$TEXT" | grep -q "CMD:heal"; then CMD="heal"; fi
          echo "CMD=$CMD" >> $GITHUB_ENV

      - name: Execute command
        run: |
          mkdir -p STATE

          if [ "$CMD" = "premium-ui" ]; then
            echo "Applying premium UI..."
            sed -i 's/background:#020617/background:linear-gradient(180deg,#020617,#0f172a)/' assets/ui.css || true
          fi

          if [ "$CMD" = "heal" ]; then
            echo "Self-healing..."
            [ -f index.html ] || echo "<h1>Recovered</h1>" > index.html
          fi

          if [ "$CMD" = "audit" ]; then
            echo "# AUDIT REPORT" > STATE/AUDIT.md
            echo "- index.html: $(test -f index.html && echo OK || echo MISSING)" >> STATE/AUDIT.md
            echo "- core.js: $(test -f assets/core.js && echo OK || echo MISSING)" >> STATE/AUDIT.md
          fi

      - name: Update logs
        run: |
          mkdir -p STATE
          echo "## RUN $(date)" >> STATE/HISTORY.md
          echo "- command: $CMD" >> STATE/HISTORY.md
          echo "- issue: ${{ github.event.issue.number }}" >> STATE/HISTORY.md
          echo "" >> STATE/HISTORY.md

      - name: Update RULES
        run: |
          cat > RULES.md <<EOT
# RULES — LIVE SYSTEM

## מצב נוכחי
- מערכת אוטומטית פעילה
- מנוע פקודות פעיל
- audit קיים
- history קיים

## פקודות זמינות
- CMD:upgrade-home
- CMD:premium-ui
- CMD:sync-rules
- CMD:audit
- CMD:heal

## סטטוס
- אוטומציה: 90%+
- מערכת: מתקדמת
EOT

      - name: Commit
        run: |
          git config user.name "auto-bot"
          git config user.email "auto@github.com"
          git add .
          git commit -m "AUTO ENGINE RUN: $CMD" || echo "no changes"
          git push
