name: AUTO SYSTEM

on:
  issues:
    types: [opened]

jobs:
  apply:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Read issue
        run: |
          echo "TEXT<<EOF" >> $GITHUB_ENV
          echo "${{ github.event.issue.body }}" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Detect command
        id: cmd
        shell: bash
        run: |
          CMD="UNKNOWN"
          if echo "$TEXT" | grep -q "CMD:upgrade-home"; then CMD="upgrade-home"; fi
          if echo "$TEXT" | grep -q "CMD:fix-navigation"; then CMD="fix-navigation"; fi
          if echo "$TEXT" | grep -q "CMD:sync-rules"; then CMD="sync-rules"; fi
          if echo "$TEXT" | grep -q "CMD:premium-ui"; then CMD="premium-ui"; fi
          echo "CMD=$CMD" >> $GITHUB_ENV
          mkdir -p STATE
          {
            echo "# LAST AUTO RUN"
            echo
            echo "- issue_number: ${{ github.event.issue.number }}"
            echo "- command: $CMD"
            echo "- status: running"
          } > STATE/LAST_AUTO_RUN.md

      - name: Apply command
        shell: bash
        run: |
          set -e

          case "$CMD" in
            upgrade-home)
              cat > index.html <<'HTML'
<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>יומן</title>
<link rel="stylesheet" href="./assets/ui.css">
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="nav">
      <a class="daily" href="./index.html">יומי</a>
      <a class="weekly" href="./history.html">שבועי</a>
      <a class="monthly" href="./month.html">חודשי</a>
      <a class="editor" href="./editor.html">כתיבה</a>
      <a class="settings" href="./settings.html">הגדרות</a>
    </div>
  </div>
  <div id="hero" class="card">
    <div id="day" class="day"></div>
    <div id="greg" class="greg"></div>
    <div id="heb" class="heb"></div>
    <div id="parasha" class="parasha"></div>
  </div>
  <div class="grid2">
    <div class="card"><div class="title">אירועי היום</div><div id="events" class="box"></div></div>
    <div class="card"><div class="title">הערות היום</div><div id="notes" class="box"></div></div>
  </div>
</div>
<script src="./assets/core.js"></script>
<script>
(async()=>{
  const d=new Date(), iso=todayISO();
  day.textContent=dayName(d);
  greg.textContent=gregDate(d);
  heb.textContent=hebDate(d);
  if(isShabbat(d)){ hero.classList.add("shabbat"); const p=await getParasha(d); if(p) parasha.textContent="פרשת השבוע: "+p; }
  const data=await loadJSON(iso);
  events.textContent=data&&Array.isArray(data.events)&&data.events.length?data.events.map((e,i)=>`${i+1}. ${typeof e==="string"?e:JSON.stringify(e)}`).join("\n"):"אין אירועים";
  notes.textContent=data&&data.notes?data.notes:"אין הערות";
})();
</script>
</body>
</html>
HTML
              ;;
            fix-navigation)
              python - <<'PY'
from pathlib import Path
targets=["index.html","history.html","month.html","editor.html"]
nav='''<div class="header">
    <div class="nav">
      <a class="daily" href="./index.html">יומי</a>
      <a class="weekly" href="./history.html">שבועי</a>
      <a class="monthly" href="./month.html">חודשי</a>
      <a class="editor" href="./editor.html">כתיבה</a>
      <a class="settings" href="./settings.html">הגדרות</a>
    </div>
  </div>'''
for t in targets:
    p=Path(t)
    if not p.exists(): continue
    s=p.read_text(encoding="utf-8")
    if 'class="nav"' in s: continue
    body_tag=s.find("<body>")
    if body_tag!=-1:
        insert_at=body_tag+len("<body>")
        s=s[:insert_at]+"\n<div class=\"wrap\">\n"+nav+s[insert_at:]
        s=s.replace("</body>","\n</div>\n</body>")
        p.write_text(s,encoding="utf-8")
PY
              ;;
            sync-rules)
              cat > RULES.md <<'MD'
# RULES — SOURCE OF TRUTH

## מה המשתמש דרש
- יום גדול בדף הראשי
- תאריך לועזי גדול
- תאריך עברי גדול
- אירועי היום והערות היום מתוך JSON אמיתי
- כפתורי ניווט עובדים באמת: יומי / שבועי / חודשי / עורך / הגדרות
- שבת ורוד
- פרשת שבוע אמיתית
- בלי טקסטי דמו
- כל דבר חייב להיות מסונכרן לריפו
- בדף הכללים חייב להיות תמיד: מה בוצע ומה עוד נשאר

## מה בוצע בפועל
- ריפו אחד בלבד
- GitHub Pages פעיל
- דף בית יומי אמיתי
- טעינת JSON אמיתית
- core.js קיים
- ui.css קיים
- דף שבועי קיים
- דף חודשי קיים
- מנוע אוטומציה דרך Issues + Actions קיים

## מה בוצע חלקית
- ניווט קיים אך דורש אימות חזותי
- שבת + פרשה קיימים בקוד אך דורשים אימות חזותי
- RULES מתעדכן כרגע דרך פקודות ולא אוטומטית אחרי כל בדיקה

## מה עדיין נשאר לבצע
- ליטוש פרימיום מלא ל-UI
- חיזוק editor.html
- אוטומציה מלאה של audit + sync-rules
- אימות חזותי מלא בטלפון לכל המסכים

## סטטוס אמיתי
- תשתית: 100%
- שמירה אמיתית: 100%
- יומי: 92%
- שבועי: 90%
- חודשי: 90%
- ניווט: 88%
- שבת + פרשה: 82%
- UI פרימיום: 55%
- אוטומציה: 80%
- התקדמות כוללת: ~85%
MD
              ;;
            premium-ui)
              python - <<'PY'
from pathlib import Path
p=Path("assets/ui.css")
s=p.read_text(encoding="utf-8") if p.exists() else ""
extra="""
.card{backdrop-filter:blur(10px)}
.box,.daycell{box-shadow:0 12px 28px rgba(0,0,0,.20)}
.title{letter-spacing:.2px}
"""
if extra not in s:
    s += "\n"+extra
p.write_text(s,encoding="utf-8")
PY
              ;;
            *)
              echo "No valid command found"
              ;;
          esac

      - name: Finalize logs and rules
        shell: bash
        run: |
          set -e
          if [ "$CMD" != "sync-rules" ] && [ -f RULES.md ]; then
            python - <<'PY'
from pathlib import Path
p=Path("RULES.md")
if p.exists():
    s=p.read_text(encoding="utf-8")
    if "## מה בוצע חלקית" in s and "AUTO LAST COMMAND" not in s:
        s += "\n\n## AUTO LAST COMMAND\n- " + "${CMD}" + "\n"
        p.write_text(s,encoding="utf-8")
PY
          fi
          {
            echo "# LAST AUTO RUN"
            echo
            echo "- issue_number: ${{ github.event.issue.number }}"
            echo "- command: $CMD"
            echo "- status: completed"
          } > STATE/LAST_AUTO_RUN.md

      - name: Commit & Push
        shell: bash
        run: |
          git config user.name "auto-bot"
          git config user.email "auto@github.com"
          git add .
          git commit -m "AUTO: $CMD" || echo "no changes"
          git push
