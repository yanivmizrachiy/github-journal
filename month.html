<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>חודשי</title>
<link rel="stylesheet" href="./assets/styles.css?v=clean">
</head>
<body>
<div class="wrap">
  <div class="nav">
    <a class="daily" href="./index.html">יומי</a>
    <a class="weekly" href="./history.html">שבועי</a>
    <a class="monthly" href="./month.html">חודשי</a>
    <a class="editor" href="./editor.html">כתיבה</a>
  </div>
  <div id="grid" class="grid"></div>
</div>
<script src="./assets/core-calendar.js?v=clean"></script>
<script>
(async()=>{
  const grid=document.getElementById('grid');
  const now=new Date();
  const year=now.getFullYear(), month=now.getMonth();
  const first=new Date(year,month,1);
  const last=new Date(year,month+1,0);
  const schoolVacations=await loadSchoolVacations();
  const map=await getHebcalDayMap(isoDate(first),isoDate(last));
  for(let blank=0; blank<first.getDay(); blank++){
    const e=document.createElement('div');
    e.className='day-cell';
    e.style.visibility='hidden';
    grid.appendChild(e);
  }
  for(let i=1;i<=last.getDate();i++){
    const d=new Date(year,month,i);
    const iso=isoDate(d);
    const items=map[iso]||[];
    const labels=await getDayLabels(d,iso,schoolVacations,items);
    const classes=getDayClasses(d,iso,schoolVacations,items);
    const cell=document.createElement('div');
    cell.className='day-cell';
    applyDayClasses(cell,classes);
    cell.innerHTML=`<div class="num">${i}</div>${labels.map(x=>`<div class="label">${x}</div>`).join("")}`;
    grid.appendChild(cell);
  }
})();
</script>
</body>
</html>
