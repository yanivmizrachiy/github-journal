<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>חודשי</title>
<link rel="stylesheet" href="./assets/styles.css">
</head>
<body>

<div id="grid" style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px;padding:10px"></div>

<script src="./assets/core-calendar.js"></script>
<script>
(async()=>{
const grid=document.getElementById('grid');
const now=new Date();
const y=now.getFullYear();
const m=now.getMonth();

const {school}=await loadAll();

for(let i=1;i<=31;i++){
  const d=new Date(y,m,i);
  if(d.getMonth()!==m) break;

  const el=document.createElement('div');
  el.style.padding="10px";
  el.style.borderRadius="10px";
  el.style.background="#111";

  let txt=i;

  if(isFriSat(d)){
    const p=await parasha(d);
    if(p) txt+=`<br>${p}`;
  }

  if(school[iso(d)]) txt+=`<br>${school[iso(d)]}`;

  el.innerHTML=txt;

  applyColors(el,d,school);

  grid.appendChild(el);
}
})();
</script>

</body>
</html>
