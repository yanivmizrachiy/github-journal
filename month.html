<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>חודשי</title>
<link rel="stylesheet" href="./assets/styles.css">
</head>
<body>
<div class="wrap">

<div class="header">
  <div class="nav">
    <a class="daily" href="./index.html">יומי</a>
    <a class="weekly" href="./history.html">שבועי</a>
    <a class="monthly" href="./month.html">חודשי</a>
    <a class="editor" href="./editor.html">כתיבה</a>
  </div>
</div>

<div class="title" id="monthTitle">חודש</div>

<div class="grid7" style="margin-top:20px">
  <div class="card" style="padding:10px;text-align:center">ראשון</div>
  <div class="card" style="padding:10px;text-align:center">שני</div>
  <div class="card" style="padding:10px;text-align:center">שלישי</div>
  <div class="card" style="padding:10px;text-align:center">רביעי</div>
  <div class="card" style="padding:10px;text-align:center">חמישי</div>
  <div class="card" style="padding:10px;text-align:center">שישי</div>
  <div class="card" style="padding:10px;text-align:center">שבת</div>
</div>

<div class="grid7" id="grid" style="margin-top:10px"></div>

</div>

<script src="./assets/core.js"></script>
<script>
(async ()=>{
  const current=new Date();
  const year=current.getFullYear();
  const month=current.getMonth();
  const first=new Date(year,month,1);
  const startDay=first.getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();

  document.getElementById("monthTitle").textContent =
    current.toLocaleDateString("he-IL",{month:"long",year:"numeric"});

  const grid=document.getElementById("grid");

  for(let i=0;i<startDay;i++){
    const empty=document.createElement("div");
    grid.appendChild(empty);
  }

  for(let d=1; d<=daysInMonth; d++){
    const date=new Date(year,month,d);
    const iso=date.toISOString().slice(0,10);

    const cell=document.createElement("div");
    cell.className="daycell"+(isShabbat(date)?" shabbat":"");
    cell.innerHTML=`
      <div class="num">${d}</div>
      <div class="sub">${hebDate(date)}</div>
      <div class="note" id="m${d}">טוען...</div>
      <div class="parasha" id="mp${d}"></div>
    `;
    grid.appendChild(cell);

    const data=await loadJSON(iso);
    document.getElementById("m"+d).textContent=data&&data.notes?String(data.notes).slice(0,60):"";

    if(isShabbat(date)){
      const p=await getParasha(date);
      if(p) document.getElementById("mp"+d).textContent="פרשה: "+p;
    }
  }
})();
</script>
</body>
</html>
