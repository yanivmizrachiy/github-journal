<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>חודשי</title>
<link rel="stylesheet" href="./assets/styles.css?v=1775558877">
</head>
<body>
<div class="wrap">
  <div class="nav">
    <a class="daily" href="./index.html">יומי</a>
    <a class="weekly" href="./history.html">שבועי</a>
    <a class="monthly" href="./month.html">חודשי</a>
    <a class="editor" href="./editor.html">כתיבה</a>
  </div>

  <div id="grid" class="grid"></div>
</div>

<script src="./assets/calendar-data.js?v=1775558877"></script>
<script src="./assets/calendar-logic.js?v=1775558877"></script>
<script>
(async()=>{
  const grid=document.getElementById('grid');
  const now=new Date();
  const year=now.getFullYear();
  const month=now.getMonth();
  const start=new Date(year,month,1);
  const daysInMonth=new Date(year,month+1,0).getDate();

  const schoolVacations=await loadSchoolVacations();
  const hebcalMap=await getHebcalMonthMap(year, month);

  for(let i=0;i<start.getDay();i++){
    const e=document.createElement('div');
    e.className='day-cell';
    e.style.visibility='hidden';
    grid.appendChild(e);
  }

  for(let i=1;i<=daysInMonth;i++){
    const d=new Date(year,month,i);
    const iso=isoDate(d);
    const parasha=isFridayOrSaturday(d) ? await getParashaForDate(d) : "";
    const labels=getLabelsForDate(iso, hebcalMap, schoolVacations, parasha);
    const classes=getClassesForDate(d, iso, hebcalMap, schoolVacations);

    const div=document.createElement('div');
    div.className='day-cell '+classes.join(' ');
    div.innerHTML=`
      <div class="num">${i}</div>
      ${labels.map(x=>`<div class="label">${x}</div>`).join("")}
    `;
    grid.appendChild(div);
  }
})();
</script>
</body>
</html>
