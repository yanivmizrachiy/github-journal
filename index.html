<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>היומן של יניב</title>
<link rel="stylesheet" href="./assets/styles.css?v=clean">
</head>
<body>
<div class="wrap">
  <div id="hero" class="card">
    <div id="day" class="day-title"></div>
    <div id="greg" class="greg"></div>
    <div id="heb" class="heb"></div>
    <div id="labels" class="box"></div>
  </div>
  <div class="card">
    <div id="events" class="box"></div>
    <div id="notes" class="box"></div>
  </div>
</div>
<script src="./assets/core-calendar.js?v=clean"></script>
<script>
(async()=>{
  const d=new Date();
  const iso=isoDate(d);
  const names=["יום ראשון","יום שני","יום שלישי","יום רביעי","יום חמישי","יום שישי","שבת"];
  day.textContent=names[d.getDay()];
  greg.textContent=iso;
  try{ heb.textContent=new Intl.DateTimeFormat("he-u-ca-hebrew",{dateStyle:"full"}).format(d); }catch{}
  const schoolVacations=await loadSchoolVacations();
  const map=await getHebcalDayMap(iso,iso);
  const items=map[iso]||[];
  const labelsArr=await getDayLabels(d,iso,schoolVacations,items);
  labels.innerHTML=labelsArr.map(x=>`<div>${x}</div>`).join("");
  const classes=getDayClasses(d,iso,schoolVacations,items);
  if(classes.includes('school')) hero.classList.add('hero-school');
  if(classes.includes('shabbat') && !classes.includes('school')) hero.classList.add('hero-shabbat');
  try{
    const r=await fetch(`./entries/${iso}.json?ts=${Date.now()}`,{cache:'no-store'});
    const data=r.ok?await r.json():null;
    events.textContent=(data&&data.events||[]).join("\n") || "אין אירועים";
    notes.textContent=(data&&data.notes)||"";
  }catch{
    events.textContent="אין אירועים";
    notes.textContent="";
  }
})();
</script>
</body>
</html>
