<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>יומן יניב</title>
<link rel="stylesheet" href="./assets/styles.css">
</head>
<body>

<div class="wrap">

<h1 id="day" style="font-size:48px;text-align:center;"></h1>
<div id="greg" style="text-align:center;margin-top:8px;"></div>
<div id="heb" style="text-align:center;margin-top:6px;"></div>

<div class="box">
<h2>מצב המערכת</h2>
<div id="status"></div>
</div>

<div class="box">
<h2>תוכן היום</h2>
<div id="events"></div>
<div id="notes"></div>
</div>

</div>

<script>
const day=document.getElementById("day");
const greg=document.getElementById("greg");
const heb=document.getElementById("heb");
const events=document.getElementById("events");
const notes=document.getElementById("notes");

const d=new Date();
const names=["יום ראשון","יום שני","יום שלישי","יום רביעי","יום חמישי","יום שישי","שבת"];

day.textContent=names[d.getDay()];
greg.textContent=d.toISOString().slice(0,10);
heb.textContent=new Intl.DateTimeFormat("he-u-ca-hebrew",{dateStyle:"full"}).format(d);

async function load(){
  const iso=d.toISOString().slice(0,10);
  try{
    const r=await fetch(`./entries/${iso}.json`);
    const data=await r.json();
    events.textContent=(data.events||[]).join("\n");
    notes.textContent=data.notes||"";
  }catch{
    events.textContent="אין אירועים";
    notes.textContent="";
  }
}

load();
</script>

</body>
</html>
