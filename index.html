<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>יומן</title>
<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white}
.wrap{max-width:900px;margin:auto;padding:20px}
.big{font-size:48px;font-weight:bold}
.mid{font-size:28px;margin-top:10px}
.box{background:#1e293b;padding:20px;margin-top:15px;border-radius:15px}
.row{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap}
.btn{padding:12px 16px;border-radius:10px;text-decoration:none;color:white;font-weight:bold}
.day{background:#3b82f6}
.week{background:#22c55e}
.month{background:#a855f7}
.edit{background:#f97316}
</style>
</head>
<body>
<div class="wrap">
  <div id="day" class="big"></div>
  <div id="greg" class="mid"></div>
  <div id="heb" class="mid"></div>

  <div class="row">
    <a class="btn day" href="#">יומי</a>
    <a class="btn week" href="#">שבועי</a>
    <a class="btn month" href="#">חודשי</a>
    <a class="btn edit" href="./editor.html">כתיבה</a>
  </div>

  <div class="box">
    <h2>אירועים</h2>
    <div id="events"></div>
  </div>

  <div class="box">
    <h2>הערות</h2>
    <div id="notes"></div>
  </div>
</div>

<script>
const d=new Date();
const names=["יום ראשון","יום שני","יום שלישי","יום רביעי","יום חמישי","יום שישי","שבת"];
document.getElementById("day").textContent=names[d.getDay()];
document.getElementById("greg").textContent=d.toLocaleDateString("he-IL");
try{
  document.getElementById("heb").textContent=
    new Intl.DateTimeFormat("he-u-ca-hebrew",{dateStyle:"full"}).format(d);
}catch{}

const iso=d.toISOString().slice(0,10);
fetch("./entries/"+iso+".json?"+Date.now())
.then(r=>r.json())
.then(data=>{
  document.getElementById("events").textContent=(data.events||[]).join(", ");
  document.getElementById("notes").textContent=data.notes||"";
})
.catch(()=>{
  document.getElementById("events").textContent="אין נתונים";
  document.getElementById("notes").textContent="";
});
</script>
</body>
</html>
