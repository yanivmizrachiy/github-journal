<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>יומן יניב</title>
  <link rel="manifest" href="./manifest.json" />
  <style>
    body{margin:0;font-family:Arial,sans-serif;background:#0f172a;color:#f8fafc}
    .wrap{max-width:820px;margin:0 auto;padding:20px}
    .card{background:#111827;border-radius:22px;padding:18px;margin-top:16px;box-shadow:0 10px 30px rgba(0,0,0,.25)}
    .title{font-size:32px;font-weight:800}
    .sub{color:#cbd5e1;margin-top:8px;line-height:1.6}
    .row{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
    .btn{display:inline-block;background:linear-gradient(180deg,#60a5fa,#2563eb);color:#fff;padding:14px 18px;border-radius:18px;text-decoration:none;font-weight:700;box-shadow:0 10px 20px rgba(37,99,235,.28), inset 0 2px 0 rgba(255,255,255,.20), inset 0 -3px 0 rgba(0,0,0,.18)}
    .btn.secondary{background:#1e293b;box-shadow:none}
    .muted{color:#94a3b8}
    .todayBox{white-space:pre-wrap;line-height:1.7}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="title">יומן יניב</div>
      <div class="sub">יומן פרטי אישי • PWA • שמירה חכמה • ללא דמו</div>
      <div class="row">
        <a class="btn" href="./editor.html">פתח עורך יומן</a>
        <a class="btn secondary" href="./history.html">היסטוריית ימים</a>
        <a class="btn secondary" id="todayFileBtn" href="#">פתח קובץ היום</a>
      </div>
    </div>

    <div class="card">
      <div class="title" style="font-size:24px">מצב המערכת</div>
      <div class="sub">
        <div>תאריך היום: <span id="todayDate"></span></div>
        <div>שם היום: <span id="todayName"></span></div>
        <div>טיוטות ממתינות: <span id="pendingCount">0</span></div>
      </div>
    </div>

    <div class="card">
      <div class="title" style="font-size:24px">תוכן היום</div>
      <div id="todayContent" class="todayBox muted">טוען...</div>
    </div>
  </div>

<script>
const QUEUE_KEY = "journal_pending_queue";
const today = new Date().toISOString().slice(0,10);
const dayNames = ['יום ראשון','יום שני','יום שלישי','יום רביעי','יום חמישי','יום שישי','שבת'];

document.getElementById("todayDate").textContent = today;
document.getElementById("todayName").textContent = dayNames[new Date(today + "T12:00:00").getDay()];
document.getElementById("todayFileBtn").href = `./entries/${today}.json`;

function getQueue(){
  try { return JSON.parse(localStorage.getItem(QUEUE_KEY) || "[]"); }
  catch { return []; }
}

document.getElementById("pendingCount").textContent = getQueue().length;

async function loadToday(){
  const box = document.getElementById("todayContent");
  try{
    const res = await fetch(`./entries/${today}.json?ts=${Date.now()}`);
    if(!res.ok) throw new Error("no file");
    const data = await res.json();
    box.classList.remove("muted");
    box.textContent =
      `שם היום: ${data.day_name || ""}\n` +
      `תאריך עברי: ${data.date_hebrew || ""}\n\n` +
      `${data.notes || "אין תוכן להיום."}`;
  }catch{
    const q = getQueue();
    const local = q.find(x => x.path === `entries/${today}.json`);
    if(local){
      const data = JSON.parse(local.raw);
      box.textContent = `נטענה טיוטה מקומית שמחכה לסנכרון.\n\n${data.notes || ""}`;
      box.classList.remove("muted");
    }else{
      box.textContent = "עדיין אין קובץ להיום.";
      box.classList.add("muted");
    }
  }
}

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js');
}

loadToday();
</script>
</body>
</html>
