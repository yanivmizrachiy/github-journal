<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>יומן</title>
<link rel="stylesheet" href="./assets/styles.css">
</head>
<body>

<div id="root" style="padding:20px;text-align:center"></div>

<script src="./assets/core-calendar.js"></script>
<script>
(async()=>{
const root=document.getElementById('root');
const d=new Date();
const names=["יום ראשון","יום שני","יום שלישי","יום רביעי","יום חמישי","יום שישי","שבת"];

const {school}=await loadAll();

let html="";
html+=`<div style="font-size:64px;font-weight:900">${names[d.getDay()]}</div>`;
html+=`<div>${iso(d)}</div>`;
html+=`<div>${new Intl.DateTimeFormat("he-u-ca-hebrew",{dateStyle:"full"}).format(d)}</div>`;

if(isFriSat(d)){
  const p=await parasha(d);
  if(p) html+=`<div>${p}</div>`;
}

root.innerHTML=html;

applyColors(document.body,d,school);
})();
</script>

</body>
</html>
