<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>שבועי</title>
<link rel="stylesheet" href="./assets/styles.css">
</head>
<body>
<div class="wrap">
  <div class="nav">
    <a class="daily" href="./index.html">יומי</a>
    <a class="weekly" href="./history.html">שבועי</a>
    <a class="monthly" href="./month.html">חודשי</a>
    <a class="editor" href="./editor.html">כתיבה</a>
  </div>

  <div class="grid" id="grid"></div>
</div>

<script src="./assets/calendar-data.js"></script>
<script src="./assets/calendar-logic.js"></script>
<script>
(async()=>{
  const grid=document.getElementById('grid');
  const now=new Date();
  const start=new Date(now);
  start.setDate(now.getDate()-now.getDay());
  const schoolVacations=await loadSchoolVacations();

  for(let i=0;i<7;i++){
    const d=new Date(start);
    d.setDate(start.getDate()+i);
    const iso=isoDate(d);

    const hebcalMap=await getHebcalMonthMap(d.getFullYear(), d.getMonth());
    const parasha=isFridayOrSaturday(d) ? await getParashaForDate(d) : "";
    const labels=getLabelsForDate(iso, hebcalMap, schoolVacations, parasha);
    const classes=getClassesForDate(d, iso, hebcalMap, schoolVacations);

    const cell=document.createElement('div');
    cell.className='day-cell '+classes.join(' ');
    cell.innerHTML=`
      <div class="num">${d.getDate()}</div>
      <div class="label">${labels.join('<br>')}</div>
    `;
    grid.appendChild(cell);
  }
})();
</script>
</body>
</html>
