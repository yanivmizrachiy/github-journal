<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>שבועי</title>
<link rel="stylesheet" href="./assets/ui.css">
</head>
<body>
<div class="wrap">

<div class="header">
  <div class="nav">
    <a class="daily" href="./index.html">יומי</a>
    <a class="weekly" href="./history.html">שבועי</a>
    <a class="monthly" href="./month.html">חודשי</a>
    <a class="editor" href="./editor.html">כתיבה</a>
  </div>
</div>

<div class="title" id="weekTitle">שבוע</div>
<div class="grid7" id="grid" style="margin-top:20px"></div>

</div>

<script src="./assets/core.js"></script>
<script>
(async ()=>{
  const grid=document.getElementById("grid");
  const base=new Date();
  base.setHours(12,0,0,0);
  base.setDate(base.getDate()-base.getDay());
  const end=new Date(base);
  end.setDate(base.getDate()+6);

  document.getElementById("weekTitle").textContent =
    base.toLocaleDateString("he-IL")+" — "+end.toLocaleDateString("he-IL");

  for(let i=0;i<7;i++){
    const d=new Date(base);
    d.setDate(base.getDate()+i);
    const iso=d.toISOString().slice(0,10);

    const cell=document.createElement("div");
    cell.className="daycell"+(isShabbat(d)?" shabbat":"");
    cell.innerHTML=`
      <div class="title">${dayName(d)}</div>
      <div class="sub">${gregDate(d)}</div>
      <div class="sub">${hebDate(d)}</div>
      <div class="note" id="n${i}">טוען...</div>
      <div class="parasha" id="p${i}"></div>
    `;
    grid.appendChild(cell);

    const data=await loadJSON(iso);
    document.getElementById("n"+i).textContent=data&&data.notes?String(data.notes).slice(0,180):"";

    if(isShabbat(d)){
      const p=await getParasha(d);
      if(p) document.getElementById("p"+i).textContent="פרשה: "+p;
    }
  }
})();
</script>
</body>
</html>
