<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>היסטוריית יומן</title>
  <link rel="manifest" href="./manifest.json" />
  <style>
    body{margin:0;font-family:Arial,sans-serif;background:#0f172a;color:#f8fafc}
    .wrap{max-width:820px;margin:0 auto;padding:20px}
    .card{background:#111827;border-radius:22px;padding:18px;margin-top:16px;box-shadow:0 10px 30px rgba(0,0,0,.25)}
    .title{font-size:30px;font-weight:800}
    .sub{color:#cbd5e1;margin-top:8px}
    .row{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
    .btn{display:inline-block;background:linear-gradient(180deg,#60a5fa,#2563eb);color:#fff;padding:12px 16px;border-radius:16px;text-decoration:none;font-weight:700}
    .btn.secondary{background:#1e293b}
    .item{padding:14px 0;border-bottom:1px solid #1f2937}
    .item:last-child{border-bottom:none}
    .date{font-weight:700;font-size:18px}
    .notes{color:#cbd5e1;margin-top:6px;white-space:pre-wrap}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="title">היסטוריית היומן</div>
      <div class="sub">צפייה בקבצי הימים האחרונים</div>
      <div class="row">
        <a class="btn secondary" href="./index.html">חזרה לדף הבית</a>
        <a class="btn" href="./editor.html">פתח עורך</a>
      </div>
    </div>
    <div class="card">
      <div id="list">טוען...</div>
            <a class="btn secondary" href="./settings.html">הגדרות</a>
      </div>
    </div>

<script>
const dates = [];
for(let i=0;i<30;i++){
  const d = new Date();
  d.setDate(d.getDate()-i);
  dates.push(d.toISOString().slice(0,10));
}

async function loadHistory(){
  const list = document.getElementById("list");
  const items = [];

  for(const date of dates){
    try{
      const res = await fetch(`./entries/${date}.json?ts=${Date.now()}`);
      if(!res.ok) continue;
      const data = await res.json();
      items.push(`
        <div class="item">
          <div class="date">${date} — ${data.day_name || ""}</div>
          <div class="notes">${(data.notes || "אין תוכן").slice(0,220)}</div>
          <div class="row">
            <a class="btn secondary" href="./entries/${date}.json">פתח JSON</a>
          </div>
        </div>
      `);
    } catch {}
  }

  list.innerHTML = items.length ? items.join("") : "לא נמצאו עדיין קבצי יומן זמינים.";
}

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js');
}

loadHistory();
</script>
</body>
</html>
