<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>שבועי</title>
<link rel="stylesheet" href="./assets/styles.css?v=clean">
</head>
<body>
<div class="wrap">
  <div class="nav">
    <a class="daily" href="./index.html">יומי</a>
    <a class="weekly" href="./history.html">שבועי</a>
    <a class="monthly" href="./month.html">חודשי</a>
    <a class="editor" href="./editor.html">כתיבה</a>
  </div>
  <div id="grid" class="grid"></div>
</div>
<script src="./assets/core-calendar.js?v=clean"></script>
<script>
(async()=>{
  const grid=document.getElementById('grid');
  const now=new Date();
  const start=new Date(now);
  start.setDate(now.getDate()-now.getDay());
  const end=new Date(start);
  end.setDate(start.getDate()+6);
  const schoolVacations=await loadSchoolVacations();
  const map=await getHebcalDayMap(isoDate(start),isoDate(end));
  for(let i=0;i<7;i++){
    const d=new Date(start); d.setDate(start.getDate()+i);
    const iso=isoDate(d);
    const items=map[iso]||[];
    const labels=await getDayLabels(d,iso,schoolVacations,items);
    const classes=getDayClasses(d,iso,schoolVacations,items);
    const cell=document.createElement('div');
    cell.className='day-cell';
    applyDayClasses(cell,classes);
    cell.innerHTML=`<div class="num">${d.getDate()}</div>${labels.map(x=>`<div class="label">${x}</div>`).join("")}`;
    grid.appendChild(cell);
  }
})();
</script>
</body>
</html>
